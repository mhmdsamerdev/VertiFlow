services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: vertiflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vertiflow
      POSTGRES_USER:     vertiflow
      POSTGRES_PASSWORD: vertiflow
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertiflow -d vertiflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
