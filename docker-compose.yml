services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: vertiflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vertiflow
      POSTGRES_USER:     vertiflow
      POSTGRES_PASSWORD: vertiflow
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertiflow -d vertiflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: vertiflow_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vertiflow:vertiflow@db:5432/vertiflow
      DEBUG: "True"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: vertiflow_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  timescaledb_data:
